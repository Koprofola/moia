<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ТО и РКС</title>
    <link rel="icon" href="{{ url_for('static', filename='uploads/image-Photoroom.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="text-slate-800 min-h-screen bg-slate-100">
    <main class="max-w-md mx-auto px-4 py-16">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="mb-4 p-4 rounded-lg {% if category == 'error' %}bg-red-100 text-red-700 border border-red-200{% elif category == 'success' %}bg-green-100 text-green-700 border border-green-200{% else %}bg-blue-100 text-blue-700 border border-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
            <div class="text-center mb-8">
                <img src="{{ url_for('static', filename='uploads/image-Photoroom.png') }}" class="w-16 h-16 mx-auto rounded-xl object-contain mb-4">
                <h1 class="text-2xl font-bold text-slate-900">Вход в систему</h1>
                <p class="text-slate-500 mt-1">Техническое обслуживание и ремонт ПК</p>
            </div>
            
            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Имя пользователя</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Введите имя">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Пароль</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Введите пароль">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition">
                    Войти
                </button>
            </form>
            
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="bg-white px-3 text-slate-400">или</span>
                </div>
            </div>

            <a href="/guest-login" class="w-full block text-center border border-slate-300 hover:border-slate-400 text-slate-600 hover:text-slate-800 bg-white hover:bg-slate-50 font-medium py-3 px-4 rounded-lg transition">
                Войти как гость
            </a>
            
            <p class="text-center text-sm text-slate-500 mt-6">
                Нет аккаунта? <a href="/register" class="text-blue-600 hover:underline">Зарегистрироваться</a>
            </p>
        </div>
    </main>
</body>
</html>
