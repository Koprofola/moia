{% extends "base.html" %}

{% block title %}{{ lesson.title }} - ТО и РКС{% endblock %}

{% block nav %}
<a href="{{ url_for('course', course_id=lesson.course_id) }}" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition">← К курсу</a>
{% endblock %}

{% block main %}
<main class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200">
        <div class="border-b border-slate-200 p-6">
            <h1 class="text-2xl font-bold text-slate-900">{{ lesson.title }}</h1>
        </div>
        <div class="p-6 prose max-w-none">
            {{ lesson.content|safe }}
        </div>
        <div class="p-6 border-t border-slate-200 bg-slate-50 rounded-b-xl">
            <button onclick="startQuiz({{ lesson.id }})" class="w-full bg-green-600 text-white py-3 px-6 rounded-lg hover:bg-green-700 transition font-medium">
                Пройти тест
            </button>
        </div>
    </div>
</main>
{% endblock %}
