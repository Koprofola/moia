{% extends "base.html" %}

{% block title %}Профиль - ТО и РКС{% endblock %}

{% block nav %}
<a href="{{ url_for('index') }}" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition">← На главную</a>
{% endblock %}

{% block main %}
<main class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <h1 class="text-2xl font-bold text-slate-900 mb-6">Личный кабинет</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="border border-slate-200 rounded-lg p-4">
                <h2 class="font-semibold text-slate-900 mb-2">{{ user.name or 'Студент' }}</h2>
                <p class="text-sm text-slate-500">Пользователь</p>
            </div>
            
            <div class="border border-slate-200 rounded-lg p-4">
                <h2 class="font-semibold text-slate-900 mb-2">{{ completed_count }}/{{ total_lessons }}</h2>
                <p class="text-sm text-slate-500">Пройдено уроков</p>
            </div>
        </div>
    </div>
</main>
{% endblock %}
