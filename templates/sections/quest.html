<section id="questSection" class="section hidden">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900">Диагностический практикум</h2>
        <p class="text-slate-600 mt-1">Симулятор поиска неисправностей</p>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center">
                    <i data-lucide="alert-triangle" class="w-6 h-6 text-amber-600"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-slate-900" id="questTitle">Загрузка сценария...</h3>
                    <p class="text-sm text-slate-500" id="questDesc"></p>
                </div>
            </div>
            <div id="questOptions" class="space-y-3">
                <!-- OPTIONS RENDER HERE -->
            </div>
            <div id="questResult" class="hidden mt-6 p-4 bg-slate-50 rounded-lg">
                <p class="text-sm text-slate-600" id="questResultText"></p>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h3 class="font-semibold text-slate-900 mb-4 flex items-center gap-2">
                <i data-lucide="activity" class="w-5 h-5 text-blue-600"></i>
                Статистика
            </h3>
            <div class="space-y-4 mb-4">
                <div class="flex justify-between">
                    <span class="text-sm text-slate-600">Решено случаев</span>
                    <span id="statCases" class="font-medium text-slate-900">0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-slate-600">Правильных ответов</span>
                    <span id="statCorrect" class="font-medium text-green-600">0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-slate-600">Точность</span>
                    <span id="statAccuracy" class="font-medium text-slate-900">0%</span>
                </div>
            </div>
            <button onclick="nextQuest()" id="nextQuestBtn" class="hidden w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition flex items-center justify-center gap-2">
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
                Следующий случай
            </button>
        </div>
    </div>
</section>
