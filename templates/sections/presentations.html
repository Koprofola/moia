<section id="presentationsSection" class="section hidden">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-3">
                <i data-lucide="presentation" class="w-7 h-7 text-blue-600"></i>
                Презентации
            </h1>
            <span class="text-sm text-slate-500" id="presentationsCount"></span>
        </div>

        <div id="presentationsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

        <div id="presentationsEmpty" class="hidden text-center py-16">
            <i data-lucide="presentation" class="w-16 h-16 text-slate-200 mx-auto mb-4"></i>
            <p class="text-slate-500 text-lg">Презентации пока не добавлены</p>
        </div>
    </div>
</section>

<div id="presentationViewer" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden">
    <div class="h-full flex flex-col">
        <div class="flex items-center justify-between p-4 bg-slate-800">
            <div class="flex items-center gap-4">
                <button onclick="closePresentationViewer()" class="w-10 h-10 bg-slate-700 hover:bg-slate-600 rounded-lg flex items-center justify-center transition">
                    <i data-lucide="x" class="w-5 h-5 text-white"></i>
                </button>
                <div>
                    <h2 id="viewerTitle" class="text-lg font-bold text-white"></h2>
                    <p id="viewerDesc" class="text-sm text-slate-400"></p>
                </div>
            </div>
            <a id="downloadBtn" href="#" download class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm transition flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i>
                Скачать
            </a>
        </div>
        <div class="flex-1 overflow-hidden">
            <iframe id="pptxFrame" class="w-full h-full border-0" src=""></iframe>
        </div>
    </div>
</div>

<script>
var PRESENTATIONS = {{ presentations_json|safe }};

function initPresentations() {
    var list = document.getElementById('presentationsList');
    var empty = document.getElementById('presentationsEmpty');
    var count = document.getElementById('presentationsCount');
    
    if (!PRESENTATIONS || PRESENTATIONS.length === 0) {
        list.classList.add('hidden');
        empty.classList.remove('hidden');
        count.textContent = '0 презентаций';
        return;
    }
    
    count.textContent = PRESENTATIONS.length + ' презентаций';
    list.innerHTML = PRESENTATIONS.map(function(pres, idx) {
        var coverHtml = pres.cover_image 
            ? '<img src="/static/uploads/lessons/' + pres.cover_image + '" class="w-full h-full object-cover">'
            : '<div class="w-full h-full bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center"><i data-lucide="presentation" class="w-12 h-12 text-blue-400"></i></div>';
        
        var filename = pres.pptx_filename || '';
        
        return '<div class="bg-slate-50 rounded-xl border border-slate-200 overflow-hidden hover:shadow-lg transition-all cursor-pointer" onclick="openPresentation(' + idx + ')">' +
            '<div class="aspect-video overflow-hidden">' + coverHtml + '</div>' +
            '<div class="p-4">' +
                '<h3 class="font-bold text-slate-900 mb-1">' + pres.title + '</h3>' +
                (pres.description ? '<p class="text-sm text-slate-500 line-clamp-2">' + pres.description + '</p>' : '') +
                (filename ? '<div class="mt-2 flex items-center gap-2 text-xs text-green-600"><i data-lucide="check-circle" class="w-3 h-3"></i> Есть файл</div>' : '') +
            '</div>' +
        '</div>';
    }).join('');
    
    setTimeout(replaceIcons, 100);
}

function openPresentation(idx) {
    var pres = PRESENTATIONS[idx];
    
    document.getElementById('viewerTitle').textContent = pres.title;
    document.getElementById('viewerDesc').textContent = pres.description || '';
    
    var downloadBtn = document.getElementById('downloadBtn');
    var frame = document.getElementById('pptxFrame');
    
    if (pres.pptx_filename) {
        downloadBtn.href = '/static/uploads/presentations/' + pres.pptx_filename;
        
        var host = window.location.origin;
        var pptxUrl = encodeURIComponent(host + '/static/uploads/presentations/' + pres.pptx_filename);
        frame.src = 'https://view.officeapps.live.com/op/embed.aspx?src=' + pptxUrl + '&wdHideTabs=true&wdDownloadButton=0';
    } else {
        downloadBtn.href = '#';
        frame.src = '';
    }
    
    document.getElementById('presentationViewer').classList.remove('hidden');
    setTimeout(replaceIcons, 100);
}

function closePresentationViewer() {
    document.getElementById('presentationViewer').classList.add('hidden');
    document.getElementById('pptxFrame').src = '';
}

document.addEventListener('keydown', function(e) {
    if (document.getElementById('presentationViewer').classList.contains('hidden')) return;
    if (e.key === 'Escape') closePresentationViewer();
});
</script>
