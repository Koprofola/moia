<section id="dashboardSection" class="section hidden">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900">Личный кабинет</h2>
        <p class="text-slate-600 mt-1">Ваш прогресс и достижения</p>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="font-semibold text-slate-900 mb-4 flex items-center gap-2">
                    <i data-lucide="book-open" class="w-5 h-5 text-blue-600"></i>
                    Прогресс обучения
                </h3>
                <div id="progressList" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="font-semibold text-slate-900 mb-4 flex items-center gap-2">
                    <i data-lucide="map" class="w-5 h-5 text-blue-600"></i>
                    Карта навыков
                </h3>
                <div id="skillMap" class="space-y-3">
                </div>
            </div>
        </div>
        <div class="space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="font-semibold text-slate-900 mb-4 flex items-center gap-2">
                    <i data-lucide="award" class="w-5 h-5 text-amber-500"></i>
                    Достижения
                </h3>
                <div id="achievements" class="grid grid-cols-3 gap-4">
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="font-semibold text-slate-900 mb-4 flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5 text-blue-600"></i>
                    Статистика
                </h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-600">Пройдено уроков</span>
                        <span id="statLessons" class="text-sm font-medium text-slate-900 bg-blue-100 px-3 py-1 rounded-lg">0/13</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-600">Решено задач</span>
                        <span id="statCases" class="text-sm font-medium text-slate-900 bg-green-100 px-3 py-1 rounded-lg">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-600">Правильных ответов</span>
                        <span id="statCorrect" class="text-sm font-medium text-green-700 bg-green-100 px-3 py-1 rounded-lg">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-600">Точность</span>
                        <span id="statAccuracy" class="text-sm font-medium text-slate-900 bg-slate-100 px-3 py-1 rounded-lg">0%</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <button onclick="resetProgress()" class="w-full text-sm text-red-600 hover:text-red-700 hover:bg-red-50 py-2 px-4 rounded-lg transition">
                    Сбросить прогресс
                </button>
            </div>
        </div>
    </div>
</section>
