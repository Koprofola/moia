{% extends "base.html" %}

{% block title %}{{ course.title }} - ТО и РКС{% endblock %}

{% block nav %}
<a href="{{ url_for('index') }}" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition">← На главную</a>
{% endblock %}

{% block main %}
<main class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <h1 class="text-2xl font-bold text-slate-900 mb-4">{{ course.title }}</h1>
        <p class="text-slate-600 mb-6">{{ course.description }}</p>
        
        <div class="space-y-4">
            {% for lesson in lessons %}
            <a href="{{ url_for('lesson', lesson_id=lesson.id) }}" class="block p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="font-medium text-slate-900">{{ lesson.title }}</h3>
                    </div>
                    <i data-lucide="arrow-right" class="w-5 h-5 text-slate-400"></i>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
